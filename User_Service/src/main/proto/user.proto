syntax = "proto3";

package user;

option java_multiple_files = true;
option java_package = "com.ezedin.grpc.user";
option java_outer_classname = "UserProto";

service UserService {
  rpc FindByUsername (UserRequest) returns (UserResponse);
}

message UserRequest {
  string username = 1;
}

message UserResponse {
  string id = 1;
  string username = 2;
  string password = 3;
  string role = 4;
}