syntax = "proto3";

package user;

option java_multiple_files = true;
option java_package = "com.ezedin.grpc.user";
option java_outer_classname = "UserProto";

service UserService {
  rpc FindByUsername (UserRequest) returns (UserGrpcResponse);
  rpc RegisterUser (CreateUserGrpcRequest) returns (UserGrpcResponse);
}

message UserRequest {
  string username = 1;
}
message CreateUserGrpcRequest{
  string username = 1;
  string email = 2;
  string password = 3;
  Role role = 4;
}
enum Role {
  ADMIN = 0;
  USER = 1;
  AUDITOR = 2;
}

message UserGrpcResponse {
  string id = 1;
  string username = 2;
  string password = 3;
  string role = 4;
  string email = 5;
}