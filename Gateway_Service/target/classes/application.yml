spring:
  application:
    name: gateway-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      filter:
        request-rate-limiter:
          deny-empty-key: false
      server:
        webflux:
          routes:
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/auth/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: authServiceCB
                    fallbackUri: forward:/fallback/auth
                - name: Retry
                  args:
                    retries: 3
                    series: ""
                    methods: GET, POST
                    exceptions: java.io.IOException, io.netty.channel.ConnectTimeoutException, org.springframework.cloud.gateway.support.TimeoutException
                    backoff:
                      firstBackoff: 50ms
                      maxBackoff: 500ms
                      factor: 2
                      basedOnPreviousValue: false
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@ipKeyResolver}"
                    redis-rate-limiter.replenishRate: 5
                    redis-rate-limiter.burstCapacity: 10
                    redis-rate-limiter.requestedTokens: 1
            - id: governance-policies
              uri: lb://governance-service
              predicates:
                - Path=/policies/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: governanceServiceCB
                    fallbackUri: forward:/fallback/governance
                - name: Retry
                  args:
                    retries: 3
                    series: ""
                    methods: GET, POST
                    exceptions: java.io.IOException, io.netty.channel.ConnectTimeoutException, org.springframework.cloud.gateway.support.TimeoutException
                    backoff:
                      firstBackoff: 50ms
                      maxBackoff: 500ms
                      factor: 2
                      basedOnPreviousValue: false
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@ipKeyResolver}"
                    redis-rate-limiter.replenishRate: 20
                    redis-rate-limiter.burstCapacity: 40
                    redis-rate-limiter.requestedTokens: 1
                - AuthenticationFilter
            - id: audit-service
              uri: lb://audit-service
              predicates:
                - Path=/audit/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: auditServiceCB
                    fallbackUri: forward:/fallback/audit
                - name: Retry
                  args:
                    retries: 3
                    series: ""
                    methods: GET, POST
                    exceptions: java.io.IOException, io.netty.channel.ConnectTimeoutException, org.springframework.cloud.gateway.support.TimeoutException
                    backoff:
                      firstBackoff: 50ms
                      maxBackoff: 500ms
                      factor: 2
                      basedOnPreviousValue: false
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@ipKeyResolver}"
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    redis-rate-limiter.requestedTokens: 1
                - AuthenticationFilter
            - id: governance-api-docs
              uri: lb://governance-service
              predicates:
                - Path=/swagger-ui/**,/v3/api-docs/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: governanceApiDocsCB
                    fallbackUri: forward:/fallback/governance
                - name: Retry
                  args:
                    retries: 3
                    series: ""
                    methods: GET, POST
                    exceptions: java.io.IOException, io.netty.channel.ConnectTimeoutException, org.springframework.cloud.gateway.support.TimeoutException
                    backoff:
                      firstBackoff: 50ms
                      maxBackoff: 500ms
                      factor: 2
                      basedOnPreviousValue: false
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@ipKeyResolver}"
                    redis-rate-limiter.replenishRate: 30
                    redis-rate-limiter.burstCapacity: 60
                    redis-rate-limiter.requestedTokens: 1

server:
  port: 8088

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
    instances:
      authServiceCB:
        base-config: default
      governanceServiceCB:
        base-config: default
      governanceApiDocsCB:
        base-config: default
      auditServiceCB:
        base-config: default

management:
  endpoints:
    web:
      exposure:
        include: health,gateway,circuitbreakers,circuitbreakerevents
  health:
    circuitbreakers:
      enabled: true

# Origins permitted to call the gateway cross-origin (Vite dev server by default).
# Root-level key (NOT under spring:) so the spring.cloud.gateway routes tree stays intact.
cors:
  allowed-origins: http://localhost:5173

