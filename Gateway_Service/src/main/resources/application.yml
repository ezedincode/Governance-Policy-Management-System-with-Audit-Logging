spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webflux:
          routes:

            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/auth/**
            - id: governance-policies
              uri: lb://governance-service
              predicates:
                - Path=/policies/**
            - id: governance-api-docs
              uri: lb://governance-service
              predicates:
                - Path=/swagger-ui/**,/v3/api-docs/**

server:
  port: 8088

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,gateway
